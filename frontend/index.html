<!--
============================================================================
RECONOMANIA — Frontend (Phase One, Revision 2)
============================================================================

FILE PURPOSE:
    Main page of the RECONOMANIA platform — updated to reflect the brand
    identity decisions from Phase One (see Brand Identity Reference doc).

    Key changes from Revision 1:
    - White/paper textured background (replacing dark theme)
    - Charcoal header bar with light logo
    - Navy blue (#0F3B5C) as primary chart colour
    - Montserrat typography for brand elements
    - Improved x-axis: 3-letter month + year below
    - Added 1M and 3M range buttons
    - Chart watermark "© RECONOMANIA"

DATE:        March 2026
PHASE:       Phase One
============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECONOMANIA — EUR/RON Exchange Rate</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Structural colours (Brand Identity Reference) */
            --charcoal: #2A2A2A;
            --off-white: #F5F5F3;
            --text-primary: #1F1F1F;
            --text-secondary: #6B6B6B;
            --borders: #D0D0D0;

            /* Primary brand colour */
            --navy: #0F3B5C;

            /* Chart series palette (ordered by usage frequency) */
            --chart-1-navy: #0F3B5C;
            --chart-2-forest: #2D8C5A;
            --chart-3-olive: #8FA03E;
            --chart-4-sky: #5B9BD5;
            --chart-5-purple: #5C4D8A;
            --chart-6-jade: #45B89A;
            --chart-7-cornflower: #7CB5E3;
            --chart-8-leaf: #6AAF5C;

            /* Emphasis */
            --alert-red: #B22E2E;

            /* Typography */
            --font-brand: 'Montserrat', sans-serif;
            --font-body: 'DM Sans', sans-serif;

            /* Chart-specific */
            --chart-area-fill: rgba(15, 59, 92, 0.07);
            --chart-grid: #E8E8E5;
            --chart-axis-text: #888888;
            --watermark: #C8C8C5;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: var(--text-primary);
            font-family: var(--font-body);
            font-weight: 400;
            line-height: 1.6;
            overflow-x: hidden;
            /*
            Paper texture background — CSS approximation.
            The Brand Identity Reference calls for a real photographic
            paper texture (whitened JPEG). Until that asset is ready,
            this CSS creates a subtle warm-white background with faint
            grain lines, approximating the paper feel.
            */
            background-color: var(--off-white);
            background-image:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.008) 2px,
                    rgba(0,0,0,0.008) 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 3px,
                    rgba(0,0,0,0.005) 3px,
                    rgba(0,0,0,0.005) 6px
                );
        }

        /* Header bar: solid charcoal, white logo (Brand Identity Reference) */
        .header {
            background: var(--charcoal);
            padding: 1.1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 1.2rem;
        }

        .brand-name {
            font-family: var(--font-brand);
            font-size: 1.5rem;
            letter-spacing: 0.06em;
        }

        .brand-r {
            color: var(--off-white);
            font-weight: 700;
        }

        .brand-econ {
            color: #6BAED6;
            font-weight: 700;
        }

        .brand-o {
            display: inline-block;
            position: relative;
            padding: 0 0.08em;
        }

        .brand-o::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1.15em;
            height: 1.15em;
            border: 1px solid rgba(107, 174, 214, 0.5);
            border-radius: 50%;
            pointer-events: none;
        }

        .brand-mania {
            color: var(--off-white);
            font-weight: 400;
        }

        .brand-tagline {
            font-family: var(--font-body);
            font-size: 0.7rem;
            color: #888888;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .chart-section {
            background: #FFFFFF;
            border: 1px solid var(--borders);
            border-radius: 6px;
            padding: 2rem;
            margin-top: 1rem;
            position: relative;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .chart-title {
            font-family: var(--font-brand);
            font-size: 1.35rem;
            color: var(--charcoal);
            font-weight: 600;
        }

        .chart-subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .current-rate {
            text-align: right;
        }

        .current-rate-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--navy);
            font-family: var(--font-brand);
            letter-spacing: -0.02em;
        }

        .current-rate-date {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 0.1rem;
        }

        .range-buttons {
            display: flex;
            gap: 0.35rem;
            margin-bottom: 1.5rem;
        }

        .range-btn {
            background: #FFFFFF;
            border: 1px solid var(--borders);
            color: var(--text-secondary);
            padding: 0.3rem 0.8rem;
            border-radius: 3px;
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .range-btn:hover {
            border-color: var(--navy);
            color: var(--navy);
        }

        .range-btn.active {
            background: var(--navy);
            color: #FFFFFF;
            border-color: var(--navy);
        }

        .chart-container {
            width: 100%;
            position: relative;
        }

        .data-line {
            fill: none;
            stroke: var(--chart-1-navy);
            stroke-width: 1.5;
        }

        .data-area {
            fill: var(--chart-area-fill);
        }

        .axis text {
            font-family: var(--font-body);
            font-size: 11px;
            fill: var(--chart-axis-text);
        }

        .axis line,
        .axis path {
            stroke: var(--borders);
        }

        .axis-month {
            font-family: var(--font-body);
            font-size: 10px;
            fill: var(--chart-axis-text);
            text-anchor: middle;
        }

        .axis-year {
            font-family: var(--font-body);
            font-size: 10px;
            fill: var(--text-secondary);
            font-weight: 500;
            text-anchor: middle;
        }

        .grid line {
            stroke: var(--chart-grid);
            stroke-dasharray: 2, 3;
        }

        .grid path {
            stroke: none;
        }

        .tooltip {
            position: absolute;
            background: #FFFFFF;
            border: 1px solid var(--borders);
            border-radius: 4px;
            padding: 0.55rem 0.75rem;
            font-size: 0.8rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .tooltip-date {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 0.15rem;
        }

        .tooltip-value {
            color: var(--navy);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .crosshair-line {
            stroke: var(--text-secondary);
            stroke-width: 0.5;
            stroke-dasharray: 3, 3;
            opacity: 0.4;
        }

        .hover-dot {
            fill: var(--navy);
            stroke: #FFFFFF;
            stroke-width: 2;
        }

        .chart-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--chart-grid);
            font-size: 0.68rem;
            color: var(--text-secondary);
        }

        .watermark {
            font-family: var(--font-brand);
            font-size: 9px;
            font-weight: 600;
            fill: var(--watermark);
            letter-spacing: 1.5px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .loading-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--navy);
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .error-message {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: var(--alert-red);
            font-size: 0.9rem;
            text-align: center;
            padding: 2rem;
        }

        @media (max-width: 768px) {
            .header {
                padding: 0.9rem 1rem;
                flex-direction: column;
                gap: 0.3rem;
            }

            .brand-tagline {
                display: none;
            }

            .main {
                padding: 1rem;
            }

            .chart-section {
                padding: 1rem;
            }

            .chart-header {
                flex-direction: column;
            }

            .current-rate {
                text-align: left;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">
            <span class="brand-name"><span class="brand-r">R</span><span class="brand-econ">ECON</span><span class="brand-mania"><span class="brand-o">O</span>MANIA</span></span>
            <span class="brand-tagline">Financial Reconnaissance for Romania</span>
        </div>
    </header>

    <main class="main">
        <div class="chart-section">

            <div class="chart-header">
                <div>
                    <h1 class="chart-title">EUR/RON Reference Exchange Rate</h1>
                </div>
                <div class="current-rate">
                    <div class="current-rate-value" id="currentRate">—</div>
                    <div class="current-rate-date" id="currentDate">Loading...</div>
                </div>
            </div>

            <div class="range-buttons">
                <button class="range-btn" data-range="3M">3M</button>
                <button class="range-btn" data-range="1Y">1Y</button>
                <button class="range-btn" data-range="5Y">5Y</button>
                <button class="range-btn" data-range="10Y">10Y</button>
                <button class="range-btn active" data-range="ALL">ALL</button>
            </div>

            <div class="chart-container" id="chartContainer">
                <div class="loading">
                    <span class="loading-dot"></span>
                    Loading data from BNR...
                </div>
            </div>

            <div class="tooltip" id="tooltip">
                <div class="tooltip-date" id="tooltipDate"></div>
                <div class="tooltip-value" id="tooltipValue"></div>
            </div>

            <div class="chart-footer">
                <span>Source: National Bank of Romania</span>
                <span>&copy; RECONOMANIA</span>
            </div>
        </div>
    </main>

    <script>
    'use strict';

    var API_URL = '/api/series/bnr_eurron_daily';
    var margin = { top: 20, right: 30, bottom: 50, left: 60 };

    var allData = [];
    var filteredData = [];
    var currentRange = 'ALL';

    async function loadData() {
        try {
            var response = await fetch(API_URL);
            if (!response.ok) {
                throw new Error('API returned status ' + response.status);
            }

            var json = await response.json();
            var parseDate = d3.timeParse('%Y-%m-%d');

            allData = json.data.map(function(d) {
                return {
                    date: parseDate(d.date),
                    value: d.value
                };
            });

            allData.sort(function(a, b) { return a.date - b.date; });

            if (allData.length > 0) {
                var latest = allData[allData.length - 1];
                document.getElementById('currentRate').textContent =
                    latest.value.toFixed(4);
                document.getElementById('currentDate').textContent =
                    d3.timeFormat('%d %B %Y')(latest.date);
            }

            filteredData = allData;
            drawChart();

        } catch (error) {
            console.error('Failed to load data:', error);
            document.getElementById('chartContainer').innerHTML =
                '<div class="error-message">' +
                'Could not load data. Make sure the backend is running.' +
                '</div>';
        }
    }

    function drawChart() {
        var container = document.getElementById('chartContainer');
        container.innerHTML = '';

        var containerWidth = container.clientWidth;
        var width = containerWidth - margin.left - margin.right;
        var height = 420 - margin.top - margin.bottom;

        if (filteredData.length === 0 || width <= 0) return;

        var svg = d3.select('#chartContainer')
            .append('svg')
            .attr('width', containerWidth)
            .attr('height', height + margin.top + margin.bottom);

        var g = svg.append('g')
            .attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

        var x = d3.scaleTime()
            .domain(d3.extent(filteredData, function(d) { return d.date; }))
            .range([0, width]);

        var yMin = d3.min(filteredData, function(d) { return d.value; });
        var yMax = d3.max(filteredData, function(d) { return d.value; });
        var yPadding = (yMax - yMin) * 0.08;

        var y = d3.scaleLinear()
            .domain([yMin - yPadding, yMax + yPadding])
            .range([height, 0]);

        // Grid lines
        g.append('g')
            .attr('class', 'grid')
            .call(
                d3.axisLeft(y)
                    .tickSize(-width)
                    .tickFormat('')
                    .ticks(6)
            );

        // Area fill under the line
        var area = d3.area()
            .x(function(d) { return x(d.date); })
            .y0(height)
            .y1(function(d) { return y(d.value); });

        g.append('path')
            .datum(filteredData)
            .attr('class', 'data-area')
            .attr('d', area);

        // Data line
        var line = d3.line()
            .x(function(d) { return x(d.date); })
            .y(function(d) { return y(d.value); });

        g.append('path')
            .datum(filteredData)
            .attr('class', 'data-line')
            .attr('d', line);

        // --- X Axis: Two-line labels (month + year) ---
        // Determine tick interval based on the visible time span.
        var domainRange = x.domain();
        var timeSpanDays = (domainRange[1] - domainRange[0]) / (86400000);

        var tickInterval;
        if (timeSpanDays <= 45) {
            tickInterval = d3.timeWeek.every(1);
        } else if (timeSpanDays <= 100) {
            tickInterval = d3.timeWeek.every(2);
        } else if (timeSpanDays <= 400) {
            tickInterval = d3.timeMonth.every(1);
        } else if (timeSpanDays <= 2000) {
            tickInterval = d3.timeMonth.every(3);
        } else if (timeSpanDays <= 4000) {
            tickInterval = d3.timeMonth.every(6);
        } else {
            tickInterval = d3.timeYear.every(1);
        }

        // Draw minimal x-axis line with small ticks, no default labels
        g.append('g')
            .attr('class', 'axis')
            .attr('transform', 'translate(0,' + height + ')')
            .call(
                d3.axisBottom(x)
                    .ticks(tickInterval)
                    .tickFormat('')
                    .tickSize(4)
            );

        // Generate tick positions
        var ticks = x.ticks(tickInterval);

        // For short ranges (1M, 3M), show "dd Mon" format
        var useShortFormat = (timeSpanDays <= 100);
        var monthFormat = d3.timeFormat('%b');
        var shortFormat = d3.timeFormat('%d %b');

        // First line: month (or dd Mon for short ranges)
        g.selectAll('.axis-month')
            .data(ticks)
            .enter()
            .append('text')
            .attr('class', 'axis-month')
            .attr('x', function(d) { return x(d); })
            .attr('y', height + 18)
            .text(function(d) {
                return useShortFormat ? shortFormat(d) : monthFormat(d);
            });

        // Second line: year — only when the year changes
        var yearFormat = d3.timeFormat('%Y');
        var lastYear = null;

        g.selectAll('.axis-year')
            .data(ticks)
            .enter()
            .append('text')
            .attr('class', 'axis-year')
            .attr('x', function(d) { return x(d); })
            .attr('y', height + 32)
            .text(function(d) {
                var yr = yearFormat(d);
                if (yr !== lastYear) {
                    lastYear = yr;
                    return yr;
                }
                return '';
            });

        // Y Axis
        g.append('g')
            .attr('class', 'axis')
            .call(
                d3.axisLeft(y)
                    .ticks(6)
                    .tickFormat(function(d) { return d.toFixed(2); })
            );

        // Watermark: "© RECONOMANIA" bottom-right inside chart
        g.append('text')
            .attr('class', 'watermark')
            .attr('x', width - 5)
            .attr('y', height - 8)
            .attr('text-anchor', 'end')
            .text('\u00A9 RECONOMANIA');

        // --- Interactive Hover ---
        var crosshairV = g.append('line')
            .attr('class', 'crosshair-line')
            .style('opacity', 0);

        var crosshairH = g.append('line')
            .attr('class', 'crosshair-line')
            .style('opacity', 0);

        var hoverDot = g.append('circle')
            .attr('class', 'hover-dot')
            .attr('r', 4)
            .style('opacity', 0);

        var tooltip = document.getElementById('tooltip');
        var tooltipDate = document.getElementById('tooltipDate');
        var tooltipValue = document.getElementById('tooltipValue');

        var bisect = d3.bisector(function(d) { return d.date; }).left;

        g.append('rect')
            .attr('width', width)
            .attr('height', height)
            .style('fill', 'none')
            .style('pointer-events', 'all')
            .on('mousemove', function(event) {
                var mouseX = d3.pointer(event, this)[0];
                var dateAtMouse = x.invert(mouseX);
                var i = bisect(filteredData, dateAtMouse, 1);
                var d0 = filteredData[i - 1];
                var d1 = filteredData[i];
                if (!d0) return;
                var d = (!d1) ? d0 :
                    (dateAtMouse - d0.date > d1.date - dateAtMouse ? d1 : d0);

                var px = x(d.date);
                var py = y(d.value);

                crosshairV
                    .attr('x1', px).attr('x2', px)
                    .attr('y1', 0).attr('y2', height)
                    .style('opacity', 1);

                crosshairH
                    .attr('x1', 0).attr('x2', width)
                    .attr('y1', py).attr('y2', py)
                    .style('opacity', 1);

                hoverDot
                    .attr('cx', px).attr('cy', py)
                    .style('opacity', 1);

                tooltipDate.textContent = d3.timeFormat('%d %B %Y')(d.date);
                tooltipValue.textContent = d.value.toFixed(4) + ' RON';

                var tooltipX = px + margin.left;
                var tooltipY = py + margin.top;

                if (tooltipX > containerWidth * 0.7) {
                    tooltip.style.left = (tooltipX - 130) + 'px';
                } else {
                    tooltip.style.left = (tooltipX + 15) + 'px';
                }
                tooltip.style.top = (tooltipY - 20) + 'px';
                tooltip.style.opacity = '1';
            })
            .on('mouseleave', function() {
                crosshairV.style('opacity', 0);
                crosshairH.style('opacity', 0);
                hoverDot.style('opacity', 0);
                tooltip.style.opacity = '0';
            });
    }

    function setRange(range) {
        currentRange = range;

        if (range === 'ALL') {
            filteredData = allData;
        } else {
            var latest = allData[allData.length - 1].date;
            var start = new Date(latest);

            switch (range) {
                case '3M':
                    start.setMonth(start.getMonth() - 3);
                    break;
                case '1Y':
                    start.setFullYear(start.getFullYear() - 1);
                    break;
                case '5Y':
                    start.setFullYear(start.getFullYear() - 5);
                    break;
                case '10Y':
                    start.setFullYear(start.getFullYear() - 10);
                    break;
            }

            filteredData = allData.filter(function(d) {
                return d.date >= start;
            });
        }

        document.querySelectorAll('.range-btn').forEach(function(btn) {
            if (btn.getAttribute('data-range') === range) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        drawChart();
    }

    document.querySelectorAll('.range-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            setRange(this.getAttribute('data-range'));
        });
    });

    var resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            if (filteredData.length > 0) {
                drawChart();
            }
        }, 200);
    });

    loadData();
    </script>
</body>
</html>
